apply plugin: 'com.android.application'

def releaseKeystoreFile = System.getenv("ALPHAMATE_ANDROID_KEYSTORE_FILE")
def releaseKeystorePassword = System.getenv("ALPHAMATE_ANDROID_KEYSTORE_PASSWORD")
def releaseKeyAlias = System.getenv("ALPHAMATE_ANDROID_KEY_ALIAS")
def releaseKeyPassword = System.getenv("ALPHAMATE_ANDROID_KEY_PASSWORD")
def releaseSigningReady = releaseKeystoreFile && releaseKeystorePassword && releaseKeyAlias && releaseKeyPassword
def androidVersionCode = (System.getenv("ALPHAMATE_ANDROID_VERSION_CODE") ?: "1") as Integer
def androidVersionName = System.getenv("ALPHAMATE_ANDROID_VERSION_NAME") ?: "1.0.0"
def androidAppName = System.getenv("ALPHAMATE_ANDROID_APP_NAME") ?: System.getenv("VITE_APP_NAME") ?: "AlphaMate"
def androidPackageName = System.getenv("VITE_GOOGLE_PLAY_PACKAGE_NAME") ?: "com.mariocrat.stockanalyze"
def admobAndroidAppId = System.getenv("VITE_ADMOB_ANDROID_APP_ID") ?: "ca-app-pub-3940256099942544~3347511713"

android {
    namespace = "com.mariocrat.stockanalyze"
    compileSdk = rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId androidPackageName
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode androidVersionCode
        versionName androidVersionName
        manifestPlaceholders = [admobAppId: admobAndroidAppId]
        resValue "string", "app_name", androidAppName
        resValue "string", "title_activity_main", androidAppName
        resValue "string", "package_name", androidPackageName
        resValue "string", "custom_url_scheme", androidPackageName
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    signingConfigs {
        release {
            if (releaseSigningReady) {
                storeFile file(releaseKeystoreFile)
                storePassword releaseKeystorePassword
                keyAlias releaseKeyAlias
                keyPassword releaseKeyPassword
            }
        }
    }
    buildTypes {
        release {
            minifyEnabled false
            if (releaseSigningReady) {
                signingConfig signingConfigs.release
            }
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }
}

tasks.matching { task ->
    task.name in ["bundleRelease", "assembleRelease"]
}.configureEach { task ->
    task.doFirst {
        if (!releaseSigningReady) {
            throw new GradleException("Release signing is not configured. Set ALPHAMATE_ANDROID_KEYSTORE_FILE, ALPHAMATE_ANDROID_KEYSTORE_PASSWORD, ALPHAMATE_ANDROID_KEY_ALIAS, and ALPHAMATE_ANDROID_KEY_PASSWORD.")
        }
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
